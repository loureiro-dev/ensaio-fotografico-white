version: '3.8'

services:
  # ==========================================
  # NGINX PROXY MANAGER (SSL E DOMÍNIOS)
  # ==========================================
  npm:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nginx-proxy-manager
    restart: always
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    networks:
      - lensai_network

  # ==========================================
  # BANCO DE DADOS (POSTGRES)
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: lensai-postgres
    restart: always
    environment:
      - POSTGRES_USER=lensai
      - POSTGRES_PASSWORD=lensai_secret
      - POSTGRES_DB=lensai_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lensai_network

  # ==========================================
  # CACHE / FILA (REDIS)
  # ==========================================
  redis:
    image: redis:alpine
    container_name: lensai-redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - lensai_network

  # ==========================================
  # TYPEBOT (BUILDER & VIEWER)
  # ==========================================
  typebot-builder:
    image: baptistearno/typebot-builder:latest
    container_name: typebot-builder
    restart: always
    depends_on:
      - postgres
    environment:
      - DATABASE_URL=postgresql://lensai:lensai_secret@postgres:5432/lensai_db?schema=public
      - NEXT_PUBLIC_VIEWER_URL=https://chat.meuensaio.digital
      - NEXTAUTH_URL=https://builder.meuensaio.digital
      - ADMIN_EMAIL=photoensaio.ai@gmail.com
      - ENCRYPTION_SECRET=EnsaioDigitalSuperSecretKey2026!
      - SMTP_USERNAME=photoensaio.ai@gmail.com
      - SMTP_PASSWORD=emhsahaadclgydsa
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=465
      - SMTP_SECURE=true
      - NEXT_PUBLIC_SMTP_FROM=photoensaio.ai@gmail.com
    networks:
      - lensai_network

  typebot-viewer:
    image: baptistearno/typebot-viewer:latest
    container_name: typebot-viewer
    restart: always
    depends_on:
      - postgres
    environment:
      - DATABASE_URL=postgresql://lensai:lensai_secret@postgres:5432/lensai_db?schema=public
      - NEXT_PUBLIC_VIEWER_URL=https://chat.meuensaio.digital
    networks:
      - lensai_network

  # ==========================================
  # EVOLUTION API & MANAGER
  # ==========================================
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution-api
    restart: always
    depends_on:
      - postgres
      - redis
    env_file:
      - ./evo.env
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - lensai_network


  evolution-manager:
    image: evoapicloud/evolution-manager:latest
    container_name: evolution-manager
    restart: always
    volumes:
      - ./manager-nginx.conf:/etc/nginx/conf.d/nginx.conf
    networks:
      - lensai_network

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    restart: always
    environment:
      - N8N_HOST=n8n.meuensaio.digital
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - WEBHOOK_URL=https://n8n.meuensaio.digital/
      - N8N_EDITOR_BASE_URL=https://n8n.meuensaio.digital
      - GENERIC_TIMEZONE=America/Sao_Paulo
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - lensai_network

volumes:
  n8n_data:
  npm_data:
  npm_letsencrypt:
  postgres_data:
  redis_data:
  evolution_instances:

networks:
  lensai_network:
    driver: bridge
